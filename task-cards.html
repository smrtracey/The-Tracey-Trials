<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracey Trials — Task Cards</title>
  <style>
    /* ── Page setup ────────────────────────────────────────────── */
    @page {
      size: 210mm 110mm landscape;
      margin: 0;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', serif;
      background: #f0ece4;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      padding: 24px;
      justify-content: center;
    }

    /* ── Card shell ────────────────────────────────────────────── */
    .card {
      width: 210mm;
      height: 110mm;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0,0,0,0.14);
      page-break-after: always;
    }

    /* ── Header band ───────────────────────────────────────────── */
    .card-header {
      background: #fff;
      color: #1a1a2e;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .card-label {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #888;
    }

    .card-title {
      font-family: 'Georgia', serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      color: #1a1a2e;
      text-align: center;
      padding-bottom: 8px;
    }

    .card-title-rule {
      width: 36px;
      height: 1.5px;
      background: #1a1a2e;
      margin: 0 auto 2px;
    }

    /* ── Accent bar ────────────────────────────────────────────── */
    .card-accent {
      display: none;
    }

    /* ── Body ──────────────────────────────────────────────────── */
    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 14px 20px 12px;
      gap: 12px;
      overflow: hidden;
      text-align: center;
    }

    /* ── Goal block ────────────────────────────────────────────── */
    .goal-block {
      border-left: none;
      border-top: 1.5px solid #1a1a2e;
      border-bottom: 1.5px solid #1a1a2e;
      padding: 6px 0;
    }

    .goal-label {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 4px;
      text-align: center;
    }

    .goal-text {
      font-family: 'Georgia', serif;
      font-size: 11.5px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.4;
    }

    .desc-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    /* ── Description ───────────────────────────────────────────── */
    .desc-label {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 4px;
      text-align: center;
    }

    .desc-text {
      font-family: 'Georgia', serif;
      font-size: 13.5px;
      color: #333;
      line-height: 1.55;
      width: 50%;
      margin: 12px auto 0;
    }

    .clue-list {
      margin: 10px 0 0;
      padding-left: 20px;
      text-align: left;
      line-height: 1.45;
    }

    .clue-list li + li {
      margin-top: 6px;
    }

    .task-doodle {
      width: 21%;
      margin: 8px auto 0;
      color: #111;
    }

    .task-doodle-image {
      width: 100%;
      height: auto;
      display: block;
      filter: grayscale(1) contrast(1.24) brightness(1.09);
      object-fit: cover;
      object-position: 0 -20px;
      /* This crops 20px from the top visually */
    }

    .task-doodle svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Only for the long Love is in the Air card */
    .card.card-side-image .desc-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 130px;
      column-gap: 14px;
      align-items: start;
    }

    .card.card-side-image .desc-label {
      grid-column: 1 / -1;
      margin-bottom: 0;
    }

    .card.card-side-image .desc-text {
      width: 100%;
      margin: 0;
      text-align: left;
      font-size: 12.6px;
      line-height: 1.46;
    }

    .card.card-side-image .clue-list {
      margin-top: 8px;
      font-size: 12px;
    }

    .card.card-side-image .task-doodle {
      width: 100%;
      margin: 0;
    }

    .card.card-side-image .task-doodle-image {
      object-fit: contain;
      object-position: center;
      max-height: 150px;
      margin-top: 2px;
    }

    /* ── Badges ────────────────────────────────────────────────── */
    .badge-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1.5px solid;
    }

    .badge-mandatory { color: #000; border-color: #000; }
    .badge-race      { color: #000; border-color: #000; }
    .badge-special   { color: #000; border-color: #000; }
    .badge-timed     { color: #000; border-color: #000; }
    .badge-deadline  { color: #333; border-color: #555; }

    /* ── Footer ────────────────────────────────────────────────── */
    .card-footer {
      padding: 6px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #ccc;
      flex-shrink: 0;
    }

    .card-footer-brand {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #999;
    }

    .card-footer-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .card-footer-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Print ─────────────────────────────────────────────────── */
    @media print {
      body {
        background: none;
        padding: 0;
        gap: 0;
        display: block;
      }
      .card {
        box-shadow: none;
        border-radius: 0;
        margin: 0 auto;
        page-break-after: avoid;
        page-break-inside: avoid;
        break-inside: avoid;
        display: block;
      }
      .card:nth-of-type(2n) {
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

<script>
const tasks = [
  {
    number: 1,

    goal: 'Work together to figure out the password.',
    description: "You've all been given private hints. You'll need to work together to figure the password.",
    clues: [
      'For the first word, look to the farmer OR the marathon runner.',
      'Not one of you have second word, but you all do.',
      'All of you want the third word. Just one of you can.',
      "The last word is what's left when the rest fall away.",
    ],
    sideImage: true,
    category: 'race',
    mandatory: true,
  },
  {
    number: 2,
    title: 'Jumping to Conclusions',
    goal: 'Improve your skipping the most.',
    description: "You'll have 30 seconds on Finale day to improve on your day 1 score.",
    category: 'common',
  },
  {
    number: 3,
    title: 'No Fame, No Gain',
    goal: 'Be the first person to take a selfie with a celebrity.',
    description: "The celebrity can't be just someone in the background like on a stage or whatever. Also must be someone the taskmaster knows. Bonus points for taskmaster shoutouts.",
    category: 'race',
  },
  {
    number: 4,
    title: 'Crowd Control!',
    goal: 'Start the biggest group chant.',
    description: "Must include at least 10 people. The taskmaster will factor in the location of the chant. Chant at a concert - pretty easy. Chant at a funeral - pretty tough...",
    category: 'common',
  },
  {
    number: 5,
    title: 'Laugh Track Record',
    goal: 'Get the best video of another player laughing.',
    description: 'The taskmaster wants to see people laughing so hard they cry!',
    category: 'common',
  },
  {
    number: 6,
    title: 'Friendship Farming',
    goal: 'Make the most new friends!',
    description: "A friend is someone you've been out with after the first time you've met. That means for this task, you need to submit a photo/video of when you met and another photo with the same person at a later date. (No group photos allowed). You'll need to include your new friends names.",
    category: 'common',
  },
  {
    number: 7,
    title: 'Side Questing',
    goal: 'Complete the most tasks.',
    description: 'Top 3 players with most completed tasks get points here.',
    category: 'common',
  },
  {
    number: 8,
    title: 'Pitch Imperfect',
    goal: 'Perform the best Karaoke.',
    description: 'No points here for singing talent. Judging will be based on song choice, costume, and stage presence. You may team up with other players for this one!',
    category: 'common',
  },
  {
    number: 9,
    title: "Hat's Off",
    goal: 'Get the taskmaster the best hat.',
    description: 'The taskmaster likes hats. The Taskmaster will pick his favourite.',
    category: 'common',
  },
  {
    number: 10,
    title: "Sunbelievable",
    goal: 'Take the best sunrise and sunset photo on the same day.',
    description: "You'll need to either submit 2 timestamped photos for this one or get a timelapse from sunrise to sunset. Hope nobody steals your goPro during the timelapse...",
    category: 'common',
  },
  {
    number: 11,
    title: 'The Grim Beeper',
    goal: 'Keep a Tamagotchi alive the longest.',
    description: "You only get ONE submission. If you think it's gonna die tomorrow, submit today. Longest living tamagotchi wins.",
    category: 'common',
  },
  {
    number: 12,
    title: 'Doc-YOU-mentary',
    goal: 'Make the best single-day documentary.',
    description: 'This can be any style you like on any day you like. Interviews, narration, POV, up to you. Submissions must be a video.',
    category: 'common',
  },
  {
    number: 13,
    title: 'GoPro or Go Home',
    goal: 'Get the most GoPro-worthy videos over the next 6 months.',
    description: "Videos can range from something as mundane as making a cup of tea to base jumping. Variety matters. Marika and Adriana can't just submit a bunch of motorbike vids...",
    category: 'common',
  },
  {
    number: 14,
    title: 'No Half-Assed Glass Task',
    goal: 'Steal the best glass.',
    description: "The taskmaster like glasses. You may steal only from a pub. Not from people's homes.(With the margins they have on drinks,you've more than covered the cost of the glass. Don't feel too guilty!) The taskmaster will decide which glass is his favourite. Need to upload photo/video evidence of the glass and present the glass on or before the finale.",
    category: 'common',
  },
  {
    number: 15,
    title: 'Love is in the Air',
    goal: 'Take this beach ball on the most romantic date.',
    description: "This one is a little bit different so that I get to play a little prank on our Danny Boy. Everyone except for Dan gets a beach ball. Dan however gets a sex doll with the same task. If at any point during the competition Dan finds out that he's the only one with a sex doll, he'll get 5 points and everyone else gets 0. Should it come up in conversation, Dan should think everyone has a sex doll.",
    sideImage: true,
    category: 'common',
  },
  {
    number: 15.1,
    title: 'Love is in the Air',
    goal: 'Take your inflatable doll on the most romantic date.',
    description: "Take your inflatable doll on the most romantic date you can imagine. Be creative! Photo or video evidence required.",
    copies: 1,
    category: 'common',
    imageOverride: 'loveIsInTheAir2.png',
  },
  {
    number: 19,
    title: "Let's Get Quizical",
    goal: 'As a team, submit 20 questions for a table quiz.',
    description: 'Quiz will likely be on finale day but date not finalized. Submit 20 quiz questions as a team of 3. On quiz day, everyone will compete individually using the questions submitted by the teams. Your questions should be fun, fair, and answerable. If one of your team’s questions is asked and nobody gets it right, you lose points.',
    category: 'timed',
    mandatory: true,
  },
  {
    number: 20,
    title: 'The Long Game',
    goal: 'Earn the most points by going head to head with other players.',
    description: "Recurring decision-based challenge. Every couple of weeks, players are paired and choose to cooperate or betray.",
    category: 'special',
    mandatory: true,
  },
  {
    number: 21,
    title: 'Eggscessive Engineering',
    goal: 'Create a Rube Goldberg Machine to crack an egg.',
    description: 'Form a team of 3 players. Then you need to submit the following:\n1. 5 household items\n2. An order of numbers 1-5 (for example 3,2,1,5,4)\n3. A designated builder from your team.',
    category: 'timed',
    deadline: 'Deadline: September 15th',
  },
  {
    number: 24,
    title: 'TaskMasterChef',
    goal: 'Create the best homemade recipe and instructional video.',
    description: 'You have 3 months to submit a home recipe in writing and an instructional video. Taskmaster will cook and rank submissions.',
    category: 'timed',
  },
]

const taskDoodleSvg = {
  1: `
    <svg viewBox="0 0 220 70" role="img" aria-label="Shush face doodle">
      <circle cx="110" cy="35" r="21" fill="none" stroke="currentColor" stroke-width="1.5"/>

      <circle cx="102" cy="30" r="1.7" fill="currentColor"/>
      <circle cx="118" cy="30" r="1.7" fill="currentColor"/>

      <path d="M102 42 Q110 46 118 42" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

      <path d="M110 24 L110 50" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M105 41 L115 41" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

      <path d="M95 48 q-4 4 -8 2" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M125 48 q4 4 8 2" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
  `,
  2: `
    <svg viewBox="0 0 220 70" role="img" aria-label="Funny jump rope doodle">
      <circle cx="110" cy="18" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M110 25 L110 43" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M110 31 L95 35" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M110 31 L125 35" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M110 43 L99 56" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M110 43 L121 56" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

      <path d="M94 35 Q110 -22 126 35" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <circle cx="94" cy="35" r="1.8" fill="currentColor"/>
      <circle cx="126" cy="35" r="1.8" fill="currentColor"/>
    </svg>
  `,
}

// Drop your custom images into ./task-card-images and map them here.
// Example: 2: 'jumping-to-conclusions.png'
const taskImageFiles = {
  1: 'sharedSecrets.png',
  2: 'jumpingToConclusions.png',
  3: 'GottaGoFast.png',
  4: 'crowdControl.png',
  5: 'laughTrackRecord.png',
  6: 'friendshipFarming.png',
  7: 'sideQuesting.png',
  8: 'pitchImperfect.png',
  9: 'hatsOff.png',
 10: 'sunbelievable.png',
 11: 'digitalChildNeglect.png',
 12: 'oneDayOnly.png',
 13: 'highlightReel.png',
 14: 'itsATraditionTheyExpectIt.png',
 15: 'loveIsInTheAir.png',
 '15.1': 'loveIsInTheAir2.png',
 19: 'letsGetQuizical.png',
 20: 'theLongGame.png',
 21: 'eggscessiveEngineering.png',
 24: 'taskMasterChef.png',
}

for (const task of tasks) {
  const copies = 1

  for (let copyIndex = 0; copyIndex < copies; copyIndex += 1) {
    const card = document.createElement('div')
    card.className = 'card'
    if (task.sideImage) {
      card.classList.add('card-side-image')
    }

    const cluesMarkup = task.clues?.length
      ? `<ol class="clue-list">${task.clues.map((clue) => `<li>${clue}</li>`).join('')}</ol>`
      : ''

    card.innerHTML = `
      <div class="card-header">
        <span class="card-label">The Tracey Trials</span>
        <h1 class="card-title">${task.title}</h1>
        <div class="card-title-rule"></div>
      </div>
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="goal-block">
          <div class="goal-label">Your Goal</div>
          <div class="goal-text">${task.goal}</div>
        </div>
        <div class="desc-col">
          <div class="desc-label">Description</div>
          <div class="desc-text">
            <p>${task.description}</p>
            ${cluesMarkup}
          </div>
          ${taskImageFiles[task.number]
            ? `<div class="task-doodle"><img class="task-doodle-image" src="./task-card-images/${taskImageFiles[task.number]}" alt="${task.title} doodle" loading="lazy" /></div>`
            : taskDoodleSvg[task.number]
              ? `<div class="task-doodle">${taskDoodleSvg[task.number]}</div>`
              : ''}
        </div>
      </div>
      <div class="card-footer">
        <span class="card-footer-brand">Tracey Trials 2026</span>
        <span class="card-footer-icon" aria-label="Checklist icon">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <rect x="2.5" y="2.5" width="19" height="19" rx="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7.2 8.2l1.6 1.7 2.4-2.7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7.2 12l1.6 1.7 2.4-2.7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7.2 15.8l1.6 1.7 2.4-2.7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 8.8h4.2M13 12.6h4.2M13 16.4h4.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
      </div>
    `

    document.body.appendChild(card)
  }
}
</script>

</body>
</html>
